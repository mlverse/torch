on:
  push:
    branches:
      - master
      - main
      - "cran/**"
  pull_request:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

name: Test

jobs:
  
  lantern:
    uses: ./.github/workflows/lantern.yaml
    if: ${{ contains(github.event.pull_request.labels.*.name, 'lantern') || github.event_name != 'pull_request' }}
    secrets: inherit

  check:
    needs: lantern
    if: ${{ always() && needs.lantern.result != 'failed' }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS, r_version: release, version: cpu-intel, runner: macos-15-intel}
          # on m1 the R version is whicherver is installed in the runner machine.
          - {os: macOS, r_version: '', version: cpu-m1, runner: [self-hosted, macOS, ARM64]}

          - {os: ubuntu, r_version: release, version: cpu, runner: ubuntu-22.04}
          - {os: ubuntu, r_version: devel, version: cpu, runner: ubuntu-22.04}
          - {os: windows, r_version: release, version: cpu, runner: windows-latest}

    runs-on: ${{ matrix.config.runner }}
    
    name: "${{ matrix.config.os }} R: ${{ matrix.config.r_version }} - ${{matrix.config.version}}"
    timeout-minutes: 120
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      TORCH_TEST: 1
      TORCH_INSTALL: 1
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      GHA_USE_NODE_20: false

    steps:

      - name: Download lantern artifacts
        if: ${{ needs.lantern.result != 'skipped' }}
        uses: actions/download-artifact@v8
        with:
          pattern: lantern-*
          path: '${{ runner.temp }}/'
          merge-multiple: true

      - name: Set base URL for downloading
        if: ${{ needs.lantern.result != 'skipped' }}
        run: |
          echo "LANTERN_BASE_URL=${{ runner.temp }}/" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-r
        with:
          r_version: ${{ matrix.config.r_version}}

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        if: ${{ env.BUILD_LANTERN == 1}}
        with:
          cmake-version: "latest" 
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: false
          extra-packages: any::rcmdcheck
          needs: check

      - name: Session info
        run: |
          Rscript -e "sessionInfo()"

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
          args: 'c("--no-multiarch", "--no-manual", "--as-cran")'

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: install-log-${{ matrix.config.os }}-${{ matrix.config.r_version }}
          path: check/torch.Rcheck/00install.out

  benchmarks:
    needs: lantern
    if: ${{ always() && needs.lantern.result != 'failed' }}
    runs-on: ubuntu-22.04
    name: "Benchmarks"
    timeout-minutes: 60
    env:
      TORCH_INSTALL: 1
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download lantern artifacts
        if: ${{ needs.lantern.result != 'skipped' }}
        uses: actions/download-artifact@v8
        with:
          pattern: lantern-*
          path: '${{ runner.temp }}/'
          merge-multiple: true

      - name: Set base URL for downloading
        if: ${{ needs.lantern.result != 'skipped' }}
        run: |
          echo "LANTERN_BASE_URL=${{ runner.temp }}/" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-r
        with:
          r_version: release

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libopenblas-dev
          sudo update-alternatives --set libblas.so.3-x86_64-linux-gnu /usr/lib/x86_64-linux-gnu/openblas-pthread/libblas.so.3
          sudo update-alternatives --set liblapack.so.3-x86_64-linux-gnu /usr/lib/x86_64-linux-gnu/openblas-pthread/liblapack.so.3

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install torch
        run: Rscript -e "install.packages('pak'); pak::local_install()"

      - name: Run CPU cache benchmark
        run: |
          echo '## CPU Cache Benchmark' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bash bench/benchmark_cpu_cache/run.sh 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-gpu-image:
    needs: lantern
    if: ${{ always() && needs.lantern.result != 'failed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120
    outputs:
      image: ghcr.io/${{ github.repository }}-ci:${{ github.sha }}
    env:
      TORCH_URL: 'https://github.com/mlverse/libtorch-mac-m1/releases/download/LibTorch-for-R/libtorch-linux-cuda128-Release-x86_64-v2.8.0.zip'

    steps:
      - uses: actions/checkout@v6

      - name: Create lantern directory
        run: mkdir -p lantern

      - name: Download lantern artifacts
        if: ${{ needs.lantern.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          pattern: lantern-*
          path: 'lantern/'
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-ci:${{ github.sha }}
          build-args: |
            TORCH_URL=${{ env.TORCH_URL }}
            LANTERN_BASE_URL=${{ needs.lantern.result == 'success' && '/build/lantern/' || '' }}

  test-gpu:
    needs: build-gpu-image
    if: ${{ always() && needs.build-gpu-image.result == 'success' }}
    runs-on: [self-hosted, gpu-local]
    container:
      image: ${{ needs.build-gpu-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: '--gpus all --runtime=nvidia'
    name: "GPU tests - cuda12.8"
    timeout-minutes: 60
    env:
      TORCH_TEST: 1
      TORCH_TEST_CUDA: 1
      TORCH_CUDATOOLKIT: 'FALSE'
      LD_LIBRARY_PATH: /usr/local/cuda/lib64

    steps:
      - name: Verify GPU access
        run: nvidia-smi

      - name: Session info
        run: |
          Rscript -e "sessionInfo()"
          Rscript -e "library(torch); cat('torch loaded, CUDA available:', cuda_is_available(), '\n')"

      - name: Run tests
        run: |
          Rscript -e "testthat::test_package('torch', reporter = 'progress')"

  test-cudatoolkit:
    needs: build-gpu-image
    if: ${{ always() && needs.build-gpu-image.result == 'success' }}
    runs-on: [self-hosted, gpu-local]
    container:
      image: ${{ needs.build-gpu-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: '--gpus all --runtime=nvidia'
    name: "cudatoolkit - cuda12.8"
    timeout-minutes: 60
    env:
      TORCH_TEST: 1
      TORCH_TEST_CUDA: 1
      CUDA: "12.8"

    steps:
      - name: Verify GPU access
        run: nvidia-smi

      - name: Session info
        run: |
          Rscript -e "sessionInfo()"
          Rscript -e "cat('CUDA lib path:', cuda12.8::lib_path(), '\n')"
          Rscript -e "cat('Libs:', list.files(cuda12.8::lib_path(), pattern = '\\\\.so'), '\n')"

      - name: Run tests
        run: |
          Rscript -e "testthat::test_package('torch', reporter = 'progress')"
