on:
  push:
    branches:
      - master
      - main
      - "cran/**"
  pull_request:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

name: Test

jobs:
  
  lantern:
    uses: ./.github/workflows/lantern.yaml
    if: ${{ contains(github.event.pull_request.labels.*.name, 'lantern') || github.event_name != 'pull_request' }}
    secrets: inherit

  check:
    needs: lantern
    if: ${{ always() && needs.lantern.result != 'failed' }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS, r_version: release, version: cpu-intel, runner: macos-15-intel}
          # on m1 the R version is whicherver is installed in the runner machine.
          - {os: macOS, r_version: '', version: cpu-m1, runner: [self-hosted, macOS, ARM64]}

          - {os: ubuntu, r_version: release, version: cpu, runner: ubuntu-22.04}
          - {os: ubuntu, r_version: devel, version: cpu, runner: ubuntu-22.04}
          - {os: windows, r_version: release, version: cpu, runner: windows-latest}

        include:

          - config: {os: ubuntu, r_version: release, version: cu12.8, runner: [self-hosted, gpu-local]}
            container: {image: 'nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04', options: '--gpus all --runtime=nvidia'}
            cuda_enabled: 1
            torch_url: 'https://github.com/mlverse/libtorch-mac-m1/releases/download/LibTorch-for-R/libtorch-linux-cuda128-Release-x86_64-v2.8.0.zip'

    runs-on: ${{ matrix.config.runner }}
    container: ${{ matrix.container }}
    
    name: "${{ matrix.config.os }} R: ${{ matrix.config.r_version }} - ${{matrix.config.version}}"
    timeout-minutes: 120
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      TORCH_TEST: 1
      TORCH_INSTALL: 1
      TORCH_TEST_CUDA: ${{ matrix.cuda_enabled }}
      TORCH_URL: ${{ matrix.torch_url }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      GHA_USE_NODE_20: false

    steps:

      - name: Download lantern artifacts
        if: ${{ needs.lantern.result != 'skipped' }}
        uses: actions/download-artifact@v7
        with:
          pattern: lantern-*
          path: '${{ runner.temp }}/'
          merge-multiple: true

      - name: Set base URL for downloading
        if: ${{ needs.lantern.result != 'skipped' }}
        run: |
          echo "LANTERN_BASE_URL=${{ runner.temp }}/" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v6

      - if: ${{ env.TORCH_TEST_CUDA == 1 }}
        shell: bash
        run: |
          nvidia-smi
          echo "--- LD_LIBRARY_PATH ---"
          echo "${LD_LIBRARY_PATH:-<not set>}"
          echo "--- CUDA libs ---"
          ls /usr/local/cuda/lib64/libcudart* /usr/local/cuda/lib64/libcublas* 2>/dev/null || echo "not found in /usr/local/cuda/lib64"
          ldconfig -p | grep -E "libcudart|libcublas" || echo "not in ldconfig cache"

      - name: Set LD_LIBRARY_PATH for CUDA
        if: ${{ env.TORCH_TEST_CUDA == 1 }}
        run: echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> $GITHUB_ENV
        shell: bash

      - uses: ./.github/actions/setup-r
        with:
          r_version: ${{ matrix.config.r_version}}

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        if: ${{ env.BUILD_LANTERN == 1}}
        with:
          cmake-version: "latest" 
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: false
          extra-packages: any::rcmdcheck
          needs: check

      - name: Session info
        run: |
          Rscript -e "sessionInfo()"

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
          args: 'c("--no-multiarch", "--no-manual", "--as-cran")'

  check-cudatoolkit:
    needs: lantern
    if: ${{ always() && needs.lantern.result != 'failed' }}
    runs-on: [self-hosted, gpu-local]
    container:
      image: nvidia/cuda:12.6.3-base-ubuntu22.04
      options: '--gpus all --runtime=nvidia'
    name: "cudatoolkit - cuda12.6"
    timeout-minutes: 120
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      TORCH_TEST: 1
      TORCH_INSTALL: 1
      TORCH_TEST_CUDA: 1
      CUDA: "12.6"
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      DEBIAN_FRONTEND: noninteractive

    steps:

      - name: Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            sudo software-properties-common dialog apt-utils \
            tzdata locales curl wget git \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libpng-dev \
            libharfbuzz-dev libfribidi-dev libtiff5-dev libjpeg-dev \
            cmake make gcc g++

      - name: Verify GPU access
        run: nvidia-smi

      - name: Download lantern artifacts
        if: ${{ needs.lantern.result != 'skipped' }}
        uses: actions/download-artifact@v7
        with:
          pattern: lantern-*
          path: '${{ runner.temp }}/'
          merge-multiple: true

      - name: Set base URL for downloading
        if: ${{ needs.lantern.result != 'skipped' }}
        run: |
          echo "LANTERN_BASE_URL=${{ runner.temp }}/" >> $GITHUB_ENV
        shell: bash

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-r
        with:
          r_version: release

      - name: Install cuda12.6 R package
        run: |
          Rscript -e "install.packages('cuda12.6', repos = c('https://mlverse.r-universe.dev', 'https://cloud.r-project.org'))"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: false
          extra-packages: any::rcmdcheck
          needs: check

      - name: Session info
        run: |
          Rscript -e "sessionInfo()"
          Rscript -e "cat('CUDA lib path:', cuda12.6::lib_path(), '\n')"
          Rscript -e "cat('Libs:', list.files(cuda12.6::lib_path(), pattern = '\\\\.so'), '\n')"

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
          args: 'c("--no-multiarch", "--no-manual", "--as-cran")'

